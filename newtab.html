<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotlight Search</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>
  <div id="background"></div>

  <div id="container">
    <!-- Search bar -->
    <div id="search-wrapper">
      <!-- Glass reflection bar -->
      <div id="glass-bar"></div>

      <div id="search-inner">
        <svg id="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search bookmarks, history, tabs, or the web…" autofocus autocomplete="off" spellcheck="false" />
        <span id="search-shortcut">⌘K</span>
      </div>

      <!-- Keyboard shortcuts info bar -->
      <div id="search-hints">
        <span><kbd>↵</kbd> Open</span>
        <span><kbd>⌘↵</kbd> Open in new tab</span>
        <span><kbd>↑↓</kbd> Navigate</span>
        <span><kbd>Esc</kbd> Close</span>
        <span><kbd>⌘B</kbd> Bookmarks</span>
        <span><kbd>⌘H</kbd> History</span>
      </div>
    </div>

    <!-- Results -->
    <div id="results-wrapper">
      <ul id="results-list"></ul>
      <div id="results-empty">
        <p>No results found.</p>
      </div>
    </div>

    <!-- Quick links (most visited) shown when no query -->
    <div id="quick-links-wrapper">
      <div id="quick-links-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Most Visited</span>
      </div>
      <div id="quick-links"></div>
    </div>
  </div>

  <!-- Settings gear -->
  <button id="settings-btn" title="Settings" tabindex="-1">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.08 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1.08z"/>
    </svg>
  </button>

  <!-- Settings panel -->
  <div id="settings-panel">
    <div id="settings-inner">
      <h2>Search Sources</h2>
      <label class="setting-row">
        <input type="checkbox" id="toggle-bookmarks" checked />
        <span class="setting-label">Bookmarks</span>
      </label>
      <label class="setting-row">
        <input type="checkbox" id="toggle-history" checked />
        <span class="setting-label">History</span>
      </label>
      <label class="setting-row">
        <input type="checkbox" id="toggle-tabs" checked />
        <span class="setting-label">Open Tabs</span>
      </label>
      <label class="setting-row">
        <input type="checkbox" id="toggle-web" checked />
        <span class="setting-label">Web Search (Omnibox)</span>
      </label>
      <label class="setting-row">
        <input type="checkbox" id="toggle-topSites" checked />
        <span class="setting-label">Show Most Visited</span>
      </label>
      <hr />
      <h2>Result Order</h2>
      <div id="order-controls">
        <div class="order-item" data-source="tabs">
          <span class="order-label">Open Tabs</span>
          <div class="order-buttons">
            <button class="order-up" title="Move up">↑</button>
            <button class="order-down" title="Move down">↓</button>
          </div>
        </div>
        <div class="order-item" data-source="web">
          <span class="order-label">Web Search</span>
          <div class="order-buttons">
            <button class="order-up" title="Move up">↑</button>
            <button class="order-down" title="Move down">↓</button>
          </div>
        </div>
        <div class="order-item" data-source="bookmarks">
          <span class="order-label">Bookmarks</span>
          <div class="order-buttons">
            <button class="order-up" title="Move up">↑</button>
            <button class="order-down" title="Move down">↓</button>
          </div>
        </div>
        <div class="order-item" data-source="history">
          <span class="order-label">History</span>
          <div class="order-buttons">
            <button class="order-up" title="Move up">↑</button>
            <button class="order-down" title="Move down">↓</button>
          </div>
        </div>
      </div>
      <hr />
      <h2>Theme</h2>
      <label class="setting-row">
        <input type="checkbox" id="toggle-blur" checked />
        <span class="setting-label">Background blur</span>
      </label>
      <label class="setting-row">
        <input type="checkbox" id="toggle-time" checked />
        <span class="setting-label">Show time &amp; date</span>
      </label>
      <br />
      <button id="settings-close" tabindex="-1">Done</button>
    </div>
  </div>

  <!-- Time overlay (optional) -->
  <div id="time-overlay">
    <div id="time"></div>
    <div id="date"></div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
