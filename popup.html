<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotlight Search</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="background"></div>

  <div id="container">
    <!-- Search bar - larger, dominant -->
    <div id="search-wrapper">
      <div id="search-inner">
        <svg id="search-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search bookmarks, history, tabs, or the web…" autofocus autocomplete="off" spellcheck="false" />
        <span id="search-shortcut">⌘E</span>
      </div>
      <div id="search-hints">
        <span><kbd>↵</kbd> Open</span>
        <span><kbd>⌘↵</kbd> New tab</span>
        <span><kbd>↑↓</kbd> Navigate</span>
        <span><kbd>Esc</kbd> Close</span>
      </div>
    </div>

    <!-- Results -->
    <div id="results-wrapper">
      <ul id="results-list"></ul>
      <div id="results-empty">
        <p>No results found.</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
